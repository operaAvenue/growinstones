<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrowinStones - Live Editor & Publisher</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0a0a0c;
      --panel-bg: rgba(18, 18, 24, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --glow-cyan: #00f0ff;
      --glow-green: #39ff14;
      --text-white: #ffffff;
      --text-muted: #8e8e9c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top Navigation bar */
    header {
      height: 60px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      background: rgba(10, 10, 12, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-container h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(45deg, var(--glow-cyan), var(--glow-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Main layout grid */
    .editor-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 450px 1fr;
      height: calc(100vh - 60px);
    }

    /* Left panel: Controls & Editors */
    .control-panel {
      border-right: 1px solid var(--border-color);
      background-color: var(--panel-bg);
      backdrop-filter: blur(15px);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0,0,0,0.2);
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 14px 0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab-btn.active {
      color: var(--text-white);
      border-bottom: 2px solid var(--glow-cyan);
      background: rgba(255, 255, 255, 0.02);
    }

    .tab-content-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Slider / Input components */
    .control-group {
      margin-bottom: 24px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .control-group label span.val {
      color: var(--glow-cyan);
      font-family: 'JetBrains Mono', monospace;
    }

    .slider-input {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .slider-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--glow-cyan);
      box-shadow: 0 0 10px var(--glow-cyan);
      transition: all 0.2s ease;
    }

    .slider-input::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* Code Editor Textareas */
    .code-editor {
      width: 100%;
      height: 480px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    .code-editor:focus {
      border-color: rgba(0, 240, 255, 0.3);
    }

    /* Deploy Settings Panel */
    .deploy-section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .deploy-section h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: var(--glow-cyan);
      font-weight: 600;
    }

    .input-field {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-white);
      font-size: 13px;
      outline: none;
      margin-bottom: 14px;
    }

    .input-field:focus {
      border-color: var(--glow-cyan);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d2ff, #0084ff);
      color: white;
    }

    .btn-primary:hover {
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
      transform: translateY(-1px);
    }

    .btn-success {
      background: linear-gradient(135deg, #39ff14, #00aa00);
      color: black;
      font-weight: 700;
    }

    .btn-success:hover {
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
      transform: translateY(-1px);
    }

    /* Right panel: Iframe container */
    .preview-container {
      background-color: #050507;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    .preview-bar {
      height: 40px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
    }

    .preview-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff5f56;
    }
    .preview-dot:nth-child(2) { background: #ffbd2e; }
    .preview-dot:nth-child(3) { background: #27c93f; }

    .preview-title {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }

    /* Notification banner */
    .notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 20px;
      border-radius: 8px;
      background: rgba(18, 18, 24, 0.95);
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      max-width: 400px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .notification.success {
      border-color: var(--glow-green);
    }

    .notification.error {
      border-color: #ff5f56;
    }

    .notification-text {
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Header Navigation -->
  <header>

      </svg>
      <h1>GrowinStones Dashboard</h1>
    </div>
  </header>

  <!-- Main Layout Grid -->
  <div class="editor-layout">
    
    <!-- Left panel: Control & Editing -->
    <div class="control-panel">
      
      <!-- Tab selectors -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('vfx')">VFX</button>
        <button class="tab-btn" onclick="switchTab('html')">HTML</button>
        <button class="tab-btn" onclick="switchTab('css')">CSS</button>
        <button class="tab-btn" onclick="switchTab('deploy')">Publish</button>
      </div>
      
      <div class="tab-content-wrapper">
        
        <!-- Tab 1: VFX Sliders -->
        <div id="tab-vfx" class="tab-content active">
          <!-- Chromatic Aberration -->
          <div class="control-group">
            <label>Chromatic Aberration <span class="val" id="val-chromatic">0.05</span></label>
            <input type="range" class="slider-input" id="slide-chromatic" min="0" max="0.3" step="0.005" value="0.05" oninput="updateVFX('chromaticAberration', this.value)">
          </div>

          <!-- Vignette Intensity -->
          <div class="control-group">
            <label>Vignette <span class="val" id="val-vignette">1.8</span></label>
            <input type="range" class="slider-input" id="slide-vignette" min="0.5" max="3" step="0.05" value="1.8" oninput="updateVFX('vignette', this.value)">
          </div>

          <!-- Scanline Speed -->
          <div class="control-group">
            <label>Scanline Speed <span class="val" id="val-scanline-speed">100</span></label>
            <input type="range" class="slider-input" id="slide-scanline-speed" min="0" max="300" step="5" value="100" oninput="updateVFX('scanlineSpeed', this.value)">
          </div>

          <!-- Scanline Opacity -->
          <div class="control-group">
            <label>Scanline Opacity <span class="val" id="val-scanline-op">0.05</span></label>
            <input type="range" class="slider-input" id="slide-scanline-op" min="0" max="0.3" step="0.01" value="0.05" oninput="updateVFX('scanlineOpacity', this.value)">
          </div>

          <!-- Grid Intensity -->
          <div class="control-group">
            <label>Grid Opacity <span class="val" id="val-grid">0.1</span></label>
            <input type="range" class="slider-input" id="slide-grid" min="0" max="0.5" step="0.01" value="0.1" oninput="updateVFX('gridIntensity', this.value)">
          </div>

          <!-- Dither Intensity -->
          <div class="control-group">
            <label>Dither Noise <span class="val" id="val-dither">0.1</span></label>
            <input type="range" class="slider-input" id="slide-dither" min="0" max="0.3" step="0.01" value="0.1" oninput="updateVFX('dither', this.value)">
          </div>

          <!-- Glitch Frequency -->
          <div class="control-group">
            <label>Glitch Frequency <span class="val" id="val-glitch-freq">0.8</span></label>
            <input type="range" class="slider-input" id="slide-glitch-freq" min="0.5" max="0.99" step="0.01" value="0.8" oninput="updateVFX('glitchFreq', this.value)">
          </div>

          <!-- Glitch Intensity -->
          <div class="control-group">
            <label>Glitch Intensity <span class="val" id="val-glitch-int">0.03</span></label>
            <input type="range" class="slider-input" id="slide-glitch-int" min="0" max="0.1" step="0.005" value="0.03" oninput="updateVFX('glitchInt', this.value)">
          </div>
        </div>
        
        <!-- Tab 2: HTML Content -->
        <div id="tab-html" class="tab-content">
          <textarea class="code-editor" id="html-textarea" placeholder="Loading HTML..."></textarea>
        </div>
        
        <!-- Tab 3: CSS Customization -->
        <div id="tab-css" class="tab-content">
          <textarea class="code-editor" id="css-textarea" placeholder="Loading CSS..."></textarea>
        </div>
        
        <!-- Tab 4: GitHub Deploy Section -->
        <div id="tab-deploy" class="tab-content">
          <div class="deploy-section">
            <h3>GitHub Credentials</h3>
            <label style="display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-muted)">GitHub Personal Access Token (PAT)</label>
            <input type="password" class="input-field" id="gh-token" placeholder="ghp_************************************">
            
            <label style="display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-muted)">Commit Message</label>
            <input type="text" class="input-field" id="commit-msg" value="Update site config via Live Editor" placeholder="Commit message">
          </div>
          
          <button class="btn btn-success" id="deploy-btn" onclick="publishToGitHub()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            Publish to GitHub
          </button>
        </div>

      </div>
    </div>

    <!-- Right panel: Live Preview -->
    <div class="preview-container">
      <div class="preview-bar">
        <div class="preview-dot"></div>
        <div class="preview-dot"></div>
        <div class="preview-dot"></div>
        <div class="preview-title">Live Preview (growinstones.vercel.app)</div>
      </div>
      <iframe id="preview-iframe" src="index.html"></iframe>
    </div>

  </div>

  <!-- Notification banner -->
  <div class="notification" id="toast">
    <div class="notification-text" id="toast-text">Success!</div>
  </div>

  <script>
    // Tab switching logic
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      const eventTarget = event ? event.target : null;
      if (eventTarget) {
        eventTarget.classList.add('active');
      } else {
        // Fallback matching
        const targetBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.textContent.toLowerCase() === tabId);
        if (targetBtn) targetBtn.classList.add('active');
      }
      
      document.getElementById(`tab-${tabId}`).classList.add('active');
    }

    // Settings & State
    const CONFIG = {
      owner: 'operaAvenue',
      repo: 'growinstones',
      branch: 'main'
    };

    let localVFXConfig = {
      vignette: 1.8,
      scanlineSpeed: 100.0,
      scanlineOpacity: 0.05,
      chromaticAberration: 0.05,
      dither: 0.1,
      gridIntensity: 0.1,
      glitchFreq: 0.8,
      glitchInt: 0.03,
    };

    // Load original contents on start
    window.addEventListener('DOMContentLoaded', async () => {
      // Restore PAT from localStorage
      const savedToken = localStorage.getItem('gh_pat');
      if (savedToken) {
        document.getElementById('gh-token').value = savedToken;
      }

      try {
        // Fetch index.html
        const htmlRes = await fetch('index.html');
        if (htmlRes.ok) {
          const htmlText = await htmlRes.text();
          document.getElementById('html-textarea').value = htmlText;
        }

        // Fetch styles.css
        const cssRes = await fetch('styles.css');
        if (cssRes.ok) {
          const cssText = await cssRes.text();
          document.getElementById('css-textarea').value = cssText;
        }
      } catch (err) {
        console.error('Error fetching source files:', err);
      }
    });

    const iframe = document.getElementById('preview-iframe');

    // Real-time VFX configurations update
    function updateVFX(param, val) {
      const parsedVal = parseFloat(val);
      localVFXConfig[param] = parsedVal;
      document.getElementById(`val-${param === 'scanline-speed' ? 'scanline-speed' : param === 'scanlineOpacity' ? 'scanline-op' : param === 'glitchFreq' ? 'glitch-freq' : param === 'glitchInt' ? 'glitch-int' : param}`).textContent = val;
      
      // Inject to iframe window configuration
      if (iframe.contentWindow && iframe.contentWindow.VFX_CONFIG) {
        iframe.contentWindow.VFX_CONFIG[param] = parsedVal;
      }
    }

    // Sync iframe initial values on load
    iframe.addEventListener('load', () => {
      if (iframe.contentWindow) {
        iframe.contentWindow.VFX_CONFIG = localVFXConfig;
      }
      injectPreviewStyle();
    });

    // Real-time CSS Customization injection
    const cssTextarea = document.getElementById('css-textarea');
    cssTextarea.addEventListener('input', () => {
      injectPreviewStyle();
    });

    function injectPreviewStyle() {
      if (!iframe.contentDocument) return;
      const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      
      let styleEl = iframeDoc.getElementById('preview-override-style');
      if (!styleEl) {
        styleEl = iframeDoc.createElement('style');
        styleEl.id = 'preview-override-style';
        iframeDoc.head.appendChild(styleEl);
      }
      styleEl.textContent = cssTextarea.value;
    }

    // Debounced HTML reload
    let htmlTimeout;
    const htmlTextarea = document.getElementById('html-textarea');
    htmlTextarea.addEventListener('input', () => {
      clearTimeout(htmlTimeout);
      htmlTimeout = setTimeout(() => {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        // Reload iframe content with custom HTML
        iframeDoc.open();
        iframeDoc.write(htmlTextarea.value);
        iframeDoc.close();
      }, 700);
    });

    // Notifications toast
    function showToast(text, type = 'success') {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toast-text');
      
      toast.className = `notification ${type}`;
      toastText.textContent = text;
      
      toast.style.display = 'flex';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 5000);
    }

    // GitHub API Push flow
    async function publishToGitHub() {
      const tokenInput = document.getElementById('gh-token').value.trim();
      const commitMsg = document.getElementById('commit-msg').value.trim() || "Update site config";
      const btn = document.getElementById('deploy-btn');
      
      if (!tokenInput) {
        showToast('Please enter your GitHub Personal Access Token.', 'error');
        return;
      }

      // Save token in localStorage
      localStorage.setItem('gh_pat', tokenInput);

      btn.disabled = true;
      btn.textContent = 'Publishing to GitHub...';
      btn.style.opacity = '0.7';

      try {
        const updatedHtml = htmlTextarea.value;
        const updatedCss = cssTextarea.value;
        
        // Generate updated app.js with saved localVFXConfig embedded as default values
        const appRes = await fetch('app.js');
        let appContent = await appRes.text();
        
        // Replace config block
        const configRegex = /window\.VFX_CONFIG\s*=\s*window\.VFX_CONFIG\s*\|\|\s*\{[\s\S]*?\};/;
        const newConfigBlock = `window.VFX_CONFIG = window.VFX_CONFIG || {
  vignette: ${localVFXConfig.vignette},
  scanlineSpeed: ${localVFXConfig.scanlineSpeed},
  scanlineOpacity: ${localVFXConfig.scanlineOpacity},
  chromaticAberration: ${localVFXConfig.chromaticAberration},
  dither: ${localVFXConfig.dither},
  gridIntensity: ${localVFXConfig.gridIntensity},
  glitchFreq: ${localVFXConfig.glitchFreq},
  glitchInt: ${localVFXConfig.glitchInt},
};`;
        appContent = appContent.replace(configRegex, newConfigBlock);

        // Upload files sequentially
        showToast('Fetching file SHAs...', 'success');
        
        await uploadFile(tokenInput, 'index.html', updatedHtml, commitMsg);
        await uploadFile(tokenInput, 'styles.css', updatedCss, commitMsg);
        await uploadFile(tokenInput, 'app.js', appContent, commitMsg);

        showToast('Successfully published all changes to GitHub! Vercel is redeploying.', 'success');
      } catch (err) {
        console.error(err);
        showToast(`Deployment failed: ${err.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
          </svg>
          Publish to GitHub`;
        btn.style.opacity = '1';
      }
    }

    async function uploadFile(token, path, content, commitMessage) {
      // 1. Fetch current file SHA
      let sha = null;
      try {
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}?ref=${CONFIG.branch}`, {
          headers: {
            'Authorization': `token ${token}`
          }
        });
        if (res.ok) {
          const data = await res.json();
          sha = data.sha;
        }
      } catch (e) {
        console.warn(`File ${path} SHA fetch failed (might be a new file).`);
      }

      // 2. Put file content
      const body = {
        message: commitMessage,
        content: btoa(unescape(encodeURIComponent(content))), // safe utf-8 base64
        branch: CONFIG.branch
      };
      
      if (sha) {
        body.sha = sha;
      }

      const putRes = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body)
      });

      if (!putRes.ok) {
        const errData = await putRes.json();
        throw new Error(errData.message || `Failed to update ${path}`);
      }
    }
  </script>
